services:
  # ──────────────────────────────────────────────────────────────────────────
  # SICODE CORE — build context/imagem configuraveis para a transicao
  # embedded -> external (ver docs/architecture/component-version-compatibility.md).
  # Default (embedded): build context = raiz deste repo (Dockerfile
  # compartilhado com SICODESK), source dir = apps/sicode-core.
  # External (repo sicode-core irmao, mesmo diretorio serve de build
  # context e source dir porque o Dockerfile la vive dentro do proprio
  # repo):
  #   SICODE_CORE_BUILD_CONTEXT=../sicode-core
  #   SICODE_CORE_SOURCE_DIR=../sicode-core
  #   SICODE_CORE_DOCKERFILE=infra/docker/Dockerfile
  # Consumo por imagem versionada (CI/producao): pre-pull SICODE_CORE_IMAGE:
  # SICODE_CORE_TAG e rodar sem --build; compose usa a imagem existente em
  # vez de reconstruir.
  # ──────────────────────────────────────────────────────────────────────────
  sicode-core:
    build:
      context: ${SICODE_CORE_BUILD_CONTEXT:-.}
      dockerfile: ${SICODE_CORE_DOCKERFILE:-infra/docker/php84/Dockerfile}
    image: ${SICODE_CORE_IMAGE:-sicode-core}:${SICODE_CORE_TAG:-local}
    working_dir: /var/www/html
    volumes:
      - ${SICODE_CORE_SOURCE_DIR:-./apps/sicode-core}:/var/www/html
    env_file:
      - ${SICODE_CORE_SOURCE_DIR:-./apps/sicode-core}/.env.example
    environment:
      APP_ENV: local
      APP_KEY: ${SICODE_CORE_APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      DB_HOST: sicode-postgres
      DB_DATABASE: sicode_core
      DB_USERNAME: sicode_core
      DB_PASSWORD: ${LOCAL_DATABASE_PASSWORD:-local_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "sicode:core:global:"
      REDIS_DB: 12
      REDIS_CACHE_DB: 13
      REDIS_SESSION_DB: 14
      REDIS_QUEUE_DB: 15
      REDIS_QUEUE_CONNECTION: queue
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_CONNECTION: redis_session
      SESSION_COOKIE: sicode_core_session
      QUEUE_CONNECTION: redis
      SICODE_CORE_ISOLATION_GUARD_ENABLED: "true"
    depends_on:
      sicode-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CORE_HTTP_PORT:-8081}:8000"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/health') === false ? 1 : 0);\""]
      interval: 10s
      timeout: 5s
      retries: 12

  sicodesk:
    build:
      context: .
      dockerfile: infra/docker/php84/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./apps/sicodesk:/var/www/html
    env_file:
      - ./apps/sicodesk/.env.example
    environment:
      APP_ENV: local
      APP_KEY: ${SICODESK_APP_KEY:-base64:BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=}
      DB_HOST: sicode-postgres
      DB_DATABASE: sicodesk
      DB_USERNAME: sicodesk
      DB_PASSWORD: ${LOCAL_DATABASE_PASSWORD:-local_dev_password}
    depends_on:
      sicode-postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${SICODESK_HTTP_PORT:-8082}:8000"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/health') === false ? 1 : 0);\""]
      interval: 10s
      timeout: 5s
      retries: 12

  # ──────────────────────────────────────────────────────────────────────────
  # SICODE Legacy SP — instância canônica de São Paulo
  # Banco: sicode_sp (sicode-legacy-sp-mariadb)
  # SICODE_IDENTITY_MODE: provisioning
  # Redis DBs: 4-7  |  Cookie: sicode_sp_session
  #
  # Build context/imagem: mesma logica embedded->external do sicode-core
  # (ver comentario la e docs/architecture/component-version-compatibility.md).
  # Imagem UNICA sicode-legacy — ES e SP usam a mesma imagem, so tags
  # diferentes (SICODE_LEGACY_SP_TAG / SICODE_LEGACY_ES_TAG) por convencao
  # de deploy, nunca builds separados.
  # External:
  #   SICODE_LEGACY_BUILD_CONTEXT=../sicode-legacy
  #   SICODE_LEGACY_SOURCE_DIR=../sicode-legacy
  #   SICODE_LEGACY_DOCKERFILE=infra/docker/Dockerfile
  # ──────────────────────────────────────────────────────────────────────────
  sicode-legacy:
    build:
      context: ${SICODE_LEGACY_BUILD_CONTEXT:-.}
      dockerfile: ${SICODE_LEGACY_DOCKERFILE:-infra/docker/legacy/Dockerfile}
    image: ${SICODE_LEGACY_IMAGE:-sicode-legacy}:${SICODE_LEGACY_SP_TAG:-local}
    working_dir: /var/www/html
    volumes:
      - ${SICODE_LEGACY_SOURCE_DIR:-./apps/sicode-legacy}:/var/www/html
      - sicode-legacy-sp-clean-storage-app:/var/www/html/storage/app
      - sicode-legacy-sp-clean-storage-logs:/var/www/html/storage/logs
    env_file:
      - ${SICODE_LEGACY_SOURCE_DIR:-./apps/sicode-legacy}/.env.example
    environment:
      APP_ENV: local
      APP_KEY: ${SICODE_LEGACY_APP_KEY:-base64:CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC=}
      APP_URL: ${SICODE_LEGACY_APP_URL:-http://localhost:8083}
      SESSION_COOKIE: sicode_sp_session
      CACHE_PREFIX: ""
      DB_CONNECTION: mysql
      DB_HOST: sicode-legacy-sp-mariadb
      DB_PORT: 3306
      DB_DATABASE: sicode_sp
      DB_USERNAME: sicode_sp
      DB_PASSWORD: ${LOCAL_LEGACY_SP_DATABASE_PASSWORD:-sp_dev_password}
      DB_LOG_HOST: sicode-legacy-sp-mariadb
      DB_LOG_PORT: 3306
      DB_LOG_DATABASE: sicode_sp
      DB_LOG_USERNAME: sicode_sp
      DB_LOG_PASSWORD: ${LOCAL_LEGACY_SP_DATABASE_PASSWORD:-sp_dev_password}
      SICODE_UNIT: ${SICODE_LEGACY_UNIT:-sp}
      SICODE_IDENTITY_MODE: ${SICODE_LEGACY_IDENTITY_MODE:-provisioning}
      SICODE_INSTANCE_CODE: ${SICODE_LEGACY_INSTANCE_CODE:-sicode-legacy-sp-local}
      SICODE_INSTANCE_NAME: ${SICODE_LEGACY_INSTANCE_NAME:-SICODE Legacy SP Local}
      SICODE_STORAGE_PREFIX: ${SICODE_LEGACY_STORAGE_PREFIX:-legacy/sp}
      SICODE_EXPECTED_DATABASE: sicode_sp
      SICODE_ISOLATION_GUARD_ENABLED: "true"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis_session
      SESSION_CONNECTION: session
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "sicode:legacy:sp:"
      REDIS_DB: 4
      REDIS_CACHE_DB: 5
      REDIS_SESSION_DB: 6
      REDIS_QUEUE_DB: 7
      CORE_LAUNCH_EXCHANGE_URL: http://sicode-core:8000/api/core/launch/exchange
      CORE_LAUNCH_CLIENT_IDENTIFIER: ${SICODE_LEGACY_CORE_CLIENT_IDENTIFIER:-sicode-legacy-sp-local}
      CORE_LAUNCH_CLIENT_SECRET: ${SICODE_LEGACY_CORE_CLIENT_SECRET:-local_legacy_core_secret}
      CORE_LAUNCH_REDIRECT_URI: ${SICODE_LEGACY_CORE_REDIRECT_URI:-http://localhost:8083/core/launch/callback}
      CORE_LAUNCH_CONTEXT: ${SICODE_LEGACY_CORE_CONTEXT:-SP}
      LEGACY_TEST_DATABASE_NAME: sicode_sp
      LEGACY_TEST_DATABASE_HOSTS: sicode-legacy-sp-mariadb,127.0.0.1,localhost
    depends_on:
      sicode-legacy-sp-mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SICODE_LEGACY_HTTP_PORT:-8083}:8000"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/') === false ? 1 : 0);\""]
      interval: 10s
      timeout: 5s
      retries: 12

  # ──────────────────────────────────────────────────────────────────────────
  # SICODE Legacy ES — instância Espírito Santo
  # Banco: sicode (tools_mariadb, rede database_default)
  # SICODE_IDENTITY_MODE: reconciliation
  # Redis DBs: 0-3  |  Cookie: sicode_es_session
  # ──────────────────────────────────────────────────────────────────────────
  sicode-legacy-es:
    build:
      context: ${SICODE_LEGACY_BUILD_CONTEXT:-.}
      dockerfile: ${SICODE_LEGACY_DOCKERFILE:-infra/docker/legacy/Dockerfile}
    image: ${SICODE_LEGACY_IMAGE:-sicode-legacy}:${SICODE_LEGACY_ES_TAG:-local}
    working_dir: /var/www/html
    volumes:
      - ${SICODE_LEGACY_SOURCE_DIR:-./apps/sicode-legacy}:/var/www/html
      - sicode-legacy-es-storage-app:/var/www/html/storage/app
      - sicode-legacy-es-storage-logs:/var/www/html/storage/logs
    env_file:
      - ${SICODE_LEGACY_SOURCE_DIR:-./apps/sicode-legacy}/.env.example
    environment:
      APP_ENV: local
      APP_NAME: "SICODE Legacy ES"
      APP_KEY: ${SICODE_LEGACY_ES_APP_KEY:-base64:CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC=}
      APP_URL: ${SICODE_LEGACY_ES_APP_URL:-http://localhost:8084}
      SESSION_COOKIE: sicode_es_session
      CACHE_PREFIX: ""
      DB_CONNECTION: mysql
      DB_HOST: tools_mariadb
      DB_PORT: 3306
      DB_DATABASE: sicode
      DB_USERNAME: sicode
      DB_PASSWORD: ${LOCAL_LEGACY_ES_DATABASE_PASSWORD:-sicode}
      DB_LOG_HOST: tools_mariadb
      DB_LOG_PORT: 3306
      DB_LOG_DATABASE: sicode
      DB_LOG_USERNAME: sicode
      DB_LOG_PASSWORD: ${LOCAL_LEGACY_ES_DATABASE_PASSWORD:-sicode}
      SICODE_UNIT: es
      SICODE_IDENTITY_MODE: reconciliation
      SICODE_INSTANCE_CODE: sicode-legacy-es-local
      SICODE_INSTANCE_NAME: "SICODE Legacy ES Local"
      SICODE_STORAGE_PREFIX: legacy/es
      SICODE_EXPECTED_DATABASE: sicode
      SICODE_ISOLATION_GUARD_ENABLED: "true"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis_session
      SESSION_CONNECTION: session
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "sicode:legacy:es:"
      REDIS_DB: 0
      REDIS_CACHE_DB: 1
      REDIS_SESSION_DB: 2
      REDIS_QUEUE_DB: 3
      CORE_LAUNCH_EXCHANGE_URL: http://sicode-core:8000/api/core/launch/exchange
      CORE_LAUNCH_CLIENT_IDENTIFIER: ${SICODE_LEGACY_ES_CORE_CLIENT_IDENTIFIER:-sicode-legacy-es-local}
      CORE_LAUNCH_CLIENT_SECRET: ${SICODE_LEGACY_ES_CORE_CLIENT_SECRET:-local_legacy_es_core_secret}
      CORE_LAUNCH_REDIRECT_URI: ${SICODE_LEGACY_ES_CORE_REDIRECT_URI:-http://localhost:8084/core/launch/callback}
      CORE_LAUNCH_CONTEXT: ES
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - database_default
    ports:
      - "${SICODE_LEGACY_ES_HTTP_PORT:-8084}:8000"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/') === false ? 1 : 0);\""]
      interval: 10s
      timeout: 5s
      retries: 12

  # ──────────────────────────────────────────────────────────────────────────
  # Legacy SP Schema Archive (nome anterior: "Snapshot", ver
  # docs/deployment/legacy-sp-schema-archive.md). Nome de service/volume
  # mantidos por serem infra ja provisionada — so a classificacao mudou.
  # NAO e backup, NAO contem dados historicos restauraveis (so schema), e
  # NAO deve ser usado como fonte de restore operacional do SP Clean.
  # Banco: sicode_legacy (sicode-legacy-snapshot-mariadb)
  # SICODE_IDENTITY_MODE: reconciliation  (provisioning DESABILITADO)
  # SICODE_ISOLATION_GUARD_ENABLED: false (não é runtime canônico)
  # Redis DBs: 8-11  |  Cookie: sicode_snapshot_session
  # Profile: snapshot  — não sobe com "docker compose up" padrão
  # ──────────────────────────────────────────────────────────────────────────
  sicode-legacy-snapshot:
    build:
      context: ${SICODE_LEGACY_BUILD_CONTEXT:-.}
      dockerfile: ${SICODE_LEGACY_DOCKERFILE:-infra/docker/legacy/Dockerfile}
    image: ${SICODE_LEGACY_IMAGE:-sicode-legacy}:${SICODE_LEGACY_SP_TAG:-local}
    working_dir: /var/www/html
    volumes:
      - ${SICODE_LEGACY_SOURCE_DIR:-./apps/sicode-legacy}:/var/www/html
      - sicode-legacy-sp-storage-app:/var/www/html/storage/app
      - sicode-legacy-sp-storage-logs:/var/www/html/storage/logs
    env_file:
      - ${SICODE_LEGACY_SOURCE_DIR:-./apps/sicode-legacy}/.env.example
    environment:
      APP_ENV: local
      APP_KEY: ${SICODE_LEGACY_APP_KEY:-base64:CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC=}
      APP_URL: ${SICODE_LEGACY_SNAPSHOT_APP_URL:-http://localhost:8085}
      APP_NAME: "SICODE Legacy Snapshot"
      SESSION_COOKIE: sicode_snapshot_session
      CACHE_PREFIX: ""
      DB_CONNECTION: mysql
      DB_HOST: sicode-legacy-snapshot-mariadb
      DB_PORT: 3306
      DB_DATABASE: sicode_legacy
      DB_USERNAME: sicode_legacy
      DB_PASSWORD: ${LOCAL_LEGACY_DATABASE_PASSWORD:-legacy_dev_password}
      DB_LOG_HOST: sicode-legacy-snapshot-mariadb
      DB_LOG_PORT: 3306
      DB_LOG_DATABASE: sicode_legacy
      DB_LOG_USERNAME: sicode_legacy
      DB_LOG_PASSWORD: ${LOCAL_LEGACY_DATABASE_PASSWORD:-legacy_dev_password}
      SICODE_UNIT: sp
      SICODE_IDENTITY_MODE: reconciliation
      SICODE_INSTANCE_CODE: sicode-legacy-snapshot-local
      SICODE_INSTANCE_NAME: "SICODE Legacy Snapshot Local"
      SICODE_STORAGE_PREFIX: legacy/snapshot
      SICODE_EXPECTED_DATABASE: sicode_legacy
      SICODE_ISOLATION_GUARD_ENABLED: "false"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis_session
      SESSION_CONNECTION: session
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "sicode:legacy:snapshot:"
      REDIS_DB: 8
      REDIS_CACHE_DB: 9
      REDIS_SESSION_DB: 10
      REDIS_QUEUE_DB: 11
      CORE_LAUNCH_EXCHANGE_URL: http://sicode-core:8000/api/core/launch/exchange
      CORE_LAUNCH_CLIENT_IDENTIFIER: ${SICODE_LEGACY_SNAPSHOT_CORE_CLIENT_IDENTIFIER:-sicode-legacy-snapshot-local}
      CORE_LAUNCH_CLIENT_SECRET: ${SICODE_LEGACY_SNAPSHOT_CORE_CLIENT_SECRET:-local_legacy_snapshot_secret}
      CORE_LAUNCH_REDIRECT_URI: ${SICODE_LEGACY_SNAPSHOT_CORE_REDIRECT_URI:-http://localhost:8085/core/launch/callback}
      CORE_LAUNCH_CONTEXT: SP
    depends_on:
      sicode-legacy-snapshot-mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SICODE_LEGACY_SNAPSHOT_HTTP_PORT:-8085}:8000"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/') === false ? 1 : 0);\""]
      interval: 10s
      timeout: 5s
      retries: 12
    profiles:
      - snapshot

  # ──────────────────────────────────────────────────────────────────────────
  # MariaDB SP Clean — banco oficial da instância SP
  # Database: sicode_sp  |  Volume: sicode-legacy-sp-clean-data (novo, vazio)
  # ──────────────────────────────────────────────────────────────────────────
  sicode-legacy-sp-mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${LOCAL_LEGACY_SP_ROOT_PASSWORD:-sp_root_password}
      MARIADB_DATABASE: sicode_sp
      MARIADB_USER: sicode_sp
      MARIADB_PASSWORD: ${LOCAL_LEGACY_SP_DATABASE_PASSWORD:-sp_dev_password}
    volumes:
      - sicode-legacy-sp-clean-data:/var/lib/mysql
    ports:
      - "${SICODE_LEGACY_SP_MARIADB_PORT:-3312}:3306"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ──────────────────────────────────────────────────────────────────────────
  # MariaDB Snapshot — banco de regressão (dados históricos preservados)
  # Database: sicode_legacy  |  Volume: sicode-legacy-mariadb-data (existente)
  # Profile: snapshot  — não sobe com "docker compose up" padrão
  # ──────────────────────────────────────────────────────────────────────────
  sicode-legacy-snapshot-mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${LOCAL_LEGACY_ROOT_PASSWORD:-legacy_root_password}
      MARIADB_DATABASE: sicode_legacy
      MARIADB_USER: sicode_legacy
      MARIADB_PASSWORD: ${LOCAL_LEGACY_DATABASE_PASSWORD:-legacy_dev_password}
    volumes:
      - sicode-legacy-mariadb-data:/var/lib/mysql
    ports:
      - "${SICODE_LEGACY_SNAPSHOT_MARIADB_PORT:-3313}:3306"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    profiles:
      - snapshot

  sicode-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sicode_admin
      POSTGRES_PASSWORD: ${LOCAL_DATABASE_PASSWORD:-local_dev_password}
      POSTGRES_DB: sicode_admin
    volumes:
      - sicode-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicode_admin -d sicode_admin"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly yes
    volumes:
      - sicode-redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      sicode-core:
        condition: service_started
      sicodesk:
        condition: service_started
      sicode-legacy:
        condition: service_started
    ports:
      - "${CADDY_HTTP_PORT:-8090}:80"

volumes:
  sicode-postgres-data:
  sicode-redis-data:
  # SP Clean — banco oficial SP (novo, vazio antes das migrations)
  sicode-legacy-sp-clean-data:
  sicode-legacy-sp-clean-storage-app:
  sicode-legacy-sp-clean-storage-logs:
  # Snapshot — banco histórico de regressão (preservado, não apagar)
  sicode-legacy-mariadb-data:
  sicode-legacy-sp-storage-app:
  sicode-legacy-sp-storage-logs:
  # ES
  sicode-legacy-es-storage-app:
  sicode-legacy-es-storage-logs:

networks:
  default:
    name: ecosystem_default
  database_default:
    external: true
